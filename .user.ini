; Raises the upload ceiling for background media (image/video) uploads — the
; PHP defaults (2-8MB) were fine for tiny form fields but rejected anything but a
; small photo. Only takes effect on hosts running PHP as CGI/FastCGI (Natro's
; MultiPHP setup); if uploads still fail with a generic error above a few MB in
; production, set these same values via cPanel's MultiPHP INI Editor instead —
; that works regardless of SAPI type.
upload_max_filesize = 100M
post_max_size = 100M
memory_limit = 256M
max_execution_time = 300
