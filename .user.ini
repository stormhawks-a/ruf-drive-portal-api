; Raises the upload ceiling for background media (image/video) uploads and for
; each individual chunk of a large (100MB+) file upload — see routes/file_uploads.php.
; Chunks are sent well under this per-request cap on purpose, so a single huge
; file (tens of GB) never needs post_max_size raised any further; only the one
; chunk in flight has to fit. Only takes effect on hosts running PHP as
; CGI/FastCGI (Natro's MultiPHP setup); if uploads still fail with a generic
; error above a few MB in production, set these same values via cPanel's
; MultiPHP INI Editor instead — that works regardless of SAPI type.
upload_max_filesize = 100M
post_max_size = 100M
memory_limit = 512M
max_execution_time = 300
