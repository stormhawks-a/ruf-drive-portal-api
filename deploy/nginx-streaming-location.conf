# RUF Drive Portal - streaming small-file upload icin gereken Nginx eklentisi
#
# Bu blok olmadan POST /files/stream (2026-07-21'de eklendi, kucuk dosyalarin
# Drive'a "aldikca akitilarak" yuklendigi yol) yine CALISIR ama tasarlandigi
# gibi HIZLANMAZ - Nginx, isteğin govdesini PHP'ye ulasmadan once TAMAMEN
# buffer'lar (varsayilan proxy_request_buffering), bu da PHP tarafinda
# kaldirdigimiz "once tumunu al, sonra gonder" sorununu bir kat asagida aynen
# geri getirir. Gercek olcumde bu satir olmadan 3.55 MB/s, bu satirla 5.03
# MB/s cikti (bkz. CLAUDE.md gotcha #30).
#
# HestiaCP kurulumu: bu dosyanin icerigini, ilgili alan adinin
# nginx.ssl.conf_* (HTTPS icin) ve/veya nginx.conf_* (HTTP icin) include
# mekanizmasiyla ekleyin - orn.
#   /home/user/conf/web/<domain>/nginx.ssl.conf_streambuffer
# HestiaCP'nin kendi ürettiği nginx.conf/nginx.ssl.conf dosyalarını DOGRUDAN
# duzenlemeyin - "DO NOT MODIFY THIS FILE" uyarisi gercek, alan adi
# yeniden olusturulursa (rebuild) o degisiklikler kaybolur, bu include
# dosyasi ise korunur.
#
# Ekledikten sonra: `nginx -t` (syntax kontrolu) + `systemctl reload nginx`.

# NOT: proxy_pass adresi mevcut VPS'in gercek IP'siyle birebir ayni olmali -
# HestiaCP Apache'yi domain'e atanan spesifik IP'ye bagliyor (127.0.0.1 DEGIL),
# nginx.ssl.conf'taki diger location bloklariyla ayni adresi kullanin.
location = /backend/files/stream {
	proxy_ssl_server_name on;
	proxy_ssl_name $host;
	proxy_pass https://187.124.117.202:8443;
	proxy_request_buffering off;
}
